<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PlayGAME">
  <meta name="description" content="Gerenciamento de eventos esportivos de areia — Vôlei, Futevôlei, Beach Tennis">
  <title>PlayGAME — Eventos de Areia</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/print.css" media="print">
  <link rel="stylesheet" href="/css/animations.css">
</head>
<body>
  <div id="auth-pages" style="display:none"></div>
  <div id="main-app" style="display:none">
    <nav class="navbar">
      <div class="navbar-inner">
        <a class="navbar-logo" href="#/">PLAY<span>GAME</span><span class="badge">Beta</span></a>
        <div class="navbar-actions">
          <button class="nav-search-btn" id="search-toggle" title="Buscar">🔍</button>
          <button class="nav-notif-btn" id="notif-bell" title="Notificações">
            🔔<span class="notif-badge" id="notif-badge" style="display:none">0</span>
          </button>
          <a class="nav-avatar" id="nav-avatar" href="#/perfil">?</a>
        </div>
      </div>
      <div id="search-bar" class="search-bar" style="display:none">
        <div class="search-bar-inner">
          <span>🔍</span>
          <input type="search" id="global-search" class="search-input" placeholder="Buscar eventos, arenas...">
          <button id="search-close">✕</button>
        </div>
      </div>
    </nav>
    <main class="main-content">
      <div id="page-content"><div class="container"><div class="loading"><div class="spinner"></div></div></div></div>
    </main>
    <nav class="bottom-nav" id="bottom-nav">
      <a class="bottom-nav-item" data-href="#/" href="#/"><span class="nav-icon">🏠</span><span class="nav-label">Início</span></a>
      <a class="bottom-nav-item" data-href="#/eventos" href="#/eventos"><span class="nav-icon">🏆</span><span class="nav-label">Eventos</span></a>
      <a class="bottom-nav-item bottom-nav-center" id="nav-middle-btn" href="#/"><span class="nav-icon-center">➕</span><span class="nav-label">Criar</span></a>
      <a class="bottom-nav-item" id="nav-inscricoes" href="#/minhas-inscricoes" data-href="#/minhas-inscricoes"><span class="nav-icon">📋</span><span class="nav-label">Inscrições</span></a>
      <a class="bottom-nav-item" data-href="#/perfil" href="#/perfil"><span class="nav-icon">👤</span><span class="nav-label">Perfil</span></a>
    </nav>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/app-extended.js"></script>
  <script src="/js/app-ui.js"></script>
  <script src="/js/brackets.js"></script>
  <script src="/js/payments.js"></script>
  <script src="/js/report.js"></script>
  <script src="/js/router-ext.js"></script>
  <script src="/js/pages-extra.js"></script>
  <script>
    document.getElementById('search-toggle').addEventListener('click',()=>{
      const b=document.getElementById('search-bar');
      const open=b.style.display!=='none';
      b.style.display=open?'none':'block';
      if(!open)document.getElementById('global-search').focus();
    });
    document.getElementById('search-close').addEventListener('click',()=>{
      document.getElementById('search-bar').style.display='none';
      document.getElementById('global-search').value='';
      document.querySelectorAll('.event-card').forEach(c=>c.style.display='');
    });
    document.getElementById('global-search').addEventListener('input',function(){
      const q=this.value.toLowerCase().trim();
      document.querySelectorAll('.event-card').forEach(c=>c.style.display=(!q||c.textContent.toLowerCase().includes(q))?'':'none');
    });
    (function configNav(){
      const u=JSON.parse(localStorage.getItem('pg_user')||'null');
      if(!u)return;
      const mid=document.getElementById('nav-middle-btn');
      const ins=document.getElementById('nav-inscricoes');
      if(u.role==='organizador'){
        mid.href='#/criar-evento';mid.setAttribute('data-href','#/criar-evento');
        mid.querySelector('.nav-label').textContent='Novo';mid.querySelector('.nav-icon-center').textContent='➕';
        ins.href='#/arenas';ins.setAttribute('data-href','#/arenas');
        ins.querySelector('.nav-icon').textContent='🏟';ins.querySelector('.nav-label').textContent='Arenas';
      } else {
        mid.href='#/eventos';mid.setAttribute('data-href','#/eventos');
        mid.querySelector('.nav-label').textContent='Explorar';mid.querySelector('.nav-icon-center').textContent='🔍';
      }
    })();
  </script>
</body>
</html>
<script>
  // Registrar Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
