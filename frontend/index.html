<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PlayGAME">
  <meta name="description" content="Gerenciamento de eventos esportivos de areia — Vôlei, Futevôlei, Beach Tennis">
  <title>PlayGAME — Eventos de Areia</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/print.css" media="print">
  <link rel="stylesheet" href="/css/animations.css">
</head>
<body>
  <div id="auth-pages" style="display:none"></div>
  <div id="main-app" style="display:none">
    <!-- Sidebar (desktop) -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <a href="#/" class="logo" style="text-decoration:none">
          <div class="logo-icon">PG</div>
          <div class="logo-text">PLAY<span>GAME</span></div>
        </a>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer" id="sidebar-footer"></div>
    </aside>

    <!-- Sidebar backdrop (mobile) -->
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <!-- Main content area -->
    <div class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="hamburger" id="hamburger-btn" aria-label="Menu">☰</button>
          <h1 class="topbar-title" id="topbar-title">Início</h1>
        </div>
        <div class="topbar-actions">
          <button class="nav-search-btn" id="search-toggle" title="Buscar"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></button>
          <button class="nav-notif-btn" id="notif-bell" title="Notificações">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="notif-badge" id="notif-badge" style="display:none">0</span>
          </button>
          <a class="nav-avatar" id="nav-avatar" href="#/perfil">?</a>
        </div>
      </header>
      <div id="search-bar" class="search-bar" style="display:none">
        <div class="search-bar-inner">
          <span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></span>
          <input type="search" id="global-search" class="search-input" placeholder="Buscar eventos, arenas...">
          <button id="search-close" class="search-close">✕</button>
        </div>
      </div>
      <div class="content">
        <div id="page-content"><div class="loading"><div class="spinner"></div></div></div>
      </div>
    </div>

    <!-- Bottom nav (mobile only) -->
    <nav class="bottom-nav" id="bottom-nav">
      <div class="bottom-nav-inner">
        <a class="bottom-nav-item" data-href="#/" href="#/"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span><span class="nav-label">Início</span></a>
        <a class="bottom-nav-item bottom-nav-center" id="nav-middle-btn" href="#/"><span class="nav-icon-center">+</span><span class="nav-label">Criar</span></a>
        <a class="bottom-nav-item" id="nav-inscricoes" href="#/minhas-inscricoes" data-href="#/minhas-inscricoes"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span><span class="nav-label">Inscrições</span></a>
        <a class="bottom-nav-item" data-href="#/perfil" href="#/perfil"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span><span class="nav-label">Perfil</span></a>
      </div>
    </nav>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/app-extended.js"></script>
  <script src="/js/app-ui.js"></script>
  <script src="/js/brackets.js"></script>
  <script src="/js/payments.js"></script>
  <script src="/js/report.js"></script>
  <script src="/js/router-ext.js"></script>
  <script src="/js/pages-extra.js"></script>
  <script>
    // Search toggle
    document.getElementById('search-toggle').addEventListener('click',()=>{
      const b=document.getElementById('search-bar');
      const open=b.style.display!=='none';
      b.style.display=open?'none':'block';
      if(!open)document.getElementById('global-search').focus();
    });
    document.getElementById('search-close').addEventListener('click',()=>{
      document.getElementById('search-bar').style.display='none';
      document.getElementById('global-search').value='';
      document.querySelectorAll('.event-card').forEach(c=>c.style.display='');
    });
    document.getElementById('global-search').addEventListener('input',function(){
      const q=this.value.toLowerCase().trim();
      document.querySelectorAll('.event-card').forEach(c=>c.style.display=(!q||c.textContent.toLowerCase().includes(q))?'':'none');
    });
    // Sidebar toggle (mobile)
    document.getElementById('hamburger-btn').addEventListener('click',()=>{
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebar-backdrop').classList.toggle('open');
    });
    document.getElementById('sidebar-backdrop').addEventListener('click',()=>{
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebar-backdrop').classList.remove('open');
    });
    // Config nav based on user role
    (function configNav(){
      const u=JSON.parse(localStorage.getItem('pg_user')||'null');
      if(!u)return;
      const mid=document.getElementById('nav-middle-btn');
      const ins=document.getElementById('nav-inscricoes');
      if(u.role==='organizador'){
        mid.href='#/criar-evento';mid.setAttribute('data-href','#/criar-evento');
        mid.querySelector('.nav-label').textContent='Novo';mid.querySelector('.nav-icon-center').textContent='+';
        ins.href='#/arenas';ins.setAttribute('data-href','#/arenas');
        ins.querySelector('.nav-icon').textContent='';ins.querySelector('.nav-label').textContent='Arenas';
      } else {
        mid.href='#/';mid.setAttribute('data-href','#/');
        mid.classList.remove('bottom-nav-center');
        mid.classList.add('bottom-nav-item');
        mid.innerHTML='<span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span><span class="nav-label">Eventos</span>';
      }
    })();
  </script>
</body>
</html>
<script>
  // Registrar Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
