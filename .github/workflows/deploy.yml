name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /opt/playgame

            # Backup .env files (not in git)
            cp -f .env /tmp/playgame_env_root 2>/dev/null || true
            cp -f backend/.env /tmp/playgame_env_backend 2>/dev/null || true

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Restore .env files
            cp -f /tmp/playgame_env_root .env 2>/dev/null || true
            cp -f /tmp/playgame_env_backend backend/.env 2>/dev/null || true

            # Rebuild and restart containers
            docker compose build --no-cache
            docker compose up -d

            # Wait and health check
            sleep 10
            curl -sf http://localhost:8091/api/health && echo "Deploy OK!" || echo "WARNING: Health check failed"
            echo "Deploy completed at $(date)"

            echo "Deploy completed at $(date)"
