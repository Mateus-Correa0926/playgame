version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: playgame-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-playgame}
      POSTGRES_USER: ${DB_USER:-playgame}
      POSTGRES_PASSWORD: ${DB_PASS:?DB_PASS obrigatório no .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-playgame} -d ${DB_NAME:-playgame}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: playgame-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-playgame}
      DB_USER: ${DB_USER:-playgame}
      DB_PASS: ${DB_PASS:?DB_PASS obrigatório no .env}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET obrigatório no .env}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8091}
    volumes:
      - uploads:/app/uploads
    expose:
      - "3001"

  nginx:
    image: nginx:alpine
    container_name: playgame-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "8091:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/app/uploads:ro

volumes:
  pgdata:
  uploads:
